name: Build Signed APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies and Build
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp index.html www/ && cp questions.json www/
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Extract Alias and Sign
        run: |
          # कीस्टोर फाइल बनाना
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
          
          # कीस्टोर से असली Alias नाम ढूँढना (ताकि गलती न हो)
          ALIAS=$(keytool -list -v -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep "Alias name" | cut -d ' ' -f 3)
          echo "Found Alias: $ALIAS"
          
          # साइनिंग टूल डाउनलोड और इस्तेमाल करना
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          java -jar uber-apk-signer-1.3.0.jar --apks android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --ks release.keystore \
            --ksAlias $ALIAS \
            --ksPass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --ksKeyPass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/*-signed.apk
