name: Build Signed APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # हमने यहाँ Java का पुराना वर्शन कर दिया ताकि Keystore एरर न दे

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp index.html www/ && cp questions.json www/
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build Unsigned APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          # Keystore को वापस फाइल में बदलना
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
          
          # APK को साइन करना (पासवर्ड 905701 और Alias 'upload')
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk upload

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Signed
          path: android/app/build/outputs/apk/release/*.apk
