name: Build Signed Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android Project
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp questions.json www/ || true
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap copy android

      - name: Create Keystore
        run: |
          cd android/app
          # यहाँ हमने पासवर्ड को ' ' के अंदर रखा है ताकि Space से एरर न आए
          keytool -genkeypair -v -alias quizpro -keyalg RSA -keysize 2048 -validity 10000 -keystore release.keystore -storepass 'abhishek Meena 2008' -keypass 'abhishek Meena 2008' -dname "CN=Abhishek, O=QuizPro, C=IN" -noprompt

      - name: Build & Sign APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password='abhishek Meena 2008' \
            -Pandroid.injected.signing.key.alias=quizpro \
            -Pandroid.injected.signing.key.password='abhishek Meena 2008'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/*.apk
