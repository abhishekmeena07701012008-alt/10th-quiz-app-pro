name: Build Signed Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Force Build Assets
        run: |
          mkdir -p www
          cp Index.html www/index.html || cp index.html www/index.html || echo "no html"
          cp Questions.json www/questions.json || cp questions.json www/questions.json || echo "no json"
          rm -rf android

      - name: Capacitor Sync
        run: |
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap copy android

      - name: Sign and Build APK
        run: |
          cd android/app
          # यहाँ पुरानी फाइल को हटाने की कमांड जोड़ दी है ताकि एरर न आए
          rm -f release.keystore
          keytool -genkeypair -v -alias quiz -keyalg RSA -keysize 2048 -validity 10000 -keystore release.keystore -storepass 905701 -keypass 905701 -dname "CN=Abhishek" -noprompt
          cd ..
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=release.keystore -Pandroid.injected.signing.store.password=905701 -Pandroid.injected.signing.key.alias=quiz -Pandroid.injected.signing.key.password=905701

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Final-Quiz-App
          path: android/app/build/outputs/apk/release/*.apk
