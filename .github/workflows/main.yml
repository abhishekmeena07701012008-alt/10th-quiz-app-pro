name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Files
        run: |
          mkdir www
          cp index.html www/
          cp questions.json www/
          # अगर आपकी कोई CSS या JS फाइल अलग से है, तो उन्हें भी यहाँ cp कमांड से जोड़ सकते हैं

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Capacitor and Build
        run: |
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-APK
          path: android/app/build/outputs/apk/release/*.apk
