name: Build Signed APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install and Build
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp index.html www/ && cp questions.json www/
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Sign APK (Final Method)
        run: |
          # Keystore बनाना
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
          
          # Android SDK से apksigner का इस्तेमाल करना
          # पासवर्ड 905701 और Alias 'upload'
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks release.keystore \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias upload \
            --key-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --out 10th-Quiz-Pro.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Quiz-App-Download
          path: 10th-Quiz-Pro.apk
