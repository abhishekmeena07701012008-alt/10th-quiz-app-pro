name: Build Signed APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install and Build
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp index.html www/ && cp questions.json www/
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar
          java -jar uber-apk-signer-1.3.0.jar --apks android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --ks release.keystore \
            --ksAlias upload \
            --ksPass "${{ secrets.KEYSTORE_PASSWORD }}" \
            --ksKeyPass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final-APK
          # यहाँ मैंने 'recursive' पाथ डाल दिया है ताकि वो फाइल कहीं भी हो, उसे ढूंढ ले
          path: "android/app/build/outputs/apk/release/*.apk"
