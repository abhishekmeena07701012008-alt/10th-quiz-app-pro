name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html www/
          cp questions.json www/ || true
          cp app-ads.txt www/ || true

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "10th Quiz Pro" "com.abhishek.quizpro" --web-dir www
          npx cap add android

      - name: Build Unsigned APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK (Smart Method)
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > release.jks
          
          # ऑटोमेटिकली असली Alias ढूँढना और साइन करना
          ALIAS=$(keytool -list -v -keystore release.jks -storepass abhishekmeena2008 | grep 'Alias name' | cut -d' ' -f3)
          echo "Found Alias: $ALIAS"
          
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign \
            --ks release.jks \
            --ks-pass pass:abhishekmeena2008 \
            --out 10th-Quiz-Pro-Signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Signed-APK
          path: 10th-Quiz-Pro-Signed.apk
