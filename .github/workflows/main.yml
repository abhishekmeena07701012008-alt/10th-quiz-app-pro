Name: Build Android APK (Unsigned)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html www/
          cp questions.json www/ || true
          cp app-ads.txt www/ || true

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "10th Quiz Pro" "com.abhishek.quizpro" --web-dir www
          npx cap add android

      # --- यहाँ से नया सुधार शुरू ---
      - name: Inject AdMob App ID into AndroidManifest
        run: |
          # यह कमांड मेनिफेस्ट फाइल में AdMob की App ID जोड़ देगी
          # यहाँ 'ca-app-pub-3294666124278706~9263155799' तुम्हारी असली App ID है
          sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3294666124278706~9263155799"/>' android/app/src/main/AndroidManifest.xml
      # --- यहाँ तक सुधार खत्म ---

      - name: Set Android Version Code Automatically
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/g" android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
