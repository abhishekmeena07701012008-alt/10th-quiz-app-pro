name: Build Signed Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Files
        run: |
          mkdir www
          cp index.html www/
          cp questions.json www/

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Capacitor
        run: |
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android

      - name: Create New Keystore
        run: |
          # यहाँ हम पहले android फोल्डर के अंदर जाते हैं
          keytool -genkey -v -keystore android/release.keystore -alias ${{ secrets.KEY_ALIAS }} -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEY_PASSWORD }} -dname "CN=Abhishek, OU=Dev, O=QuizPro, L=Jaipur, S=Rajasthan, C=IN"

      - name: Build & Sign APK
        run: |
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Signed-APK
          path: android/app/build/outputs/apk/release/*.apk
