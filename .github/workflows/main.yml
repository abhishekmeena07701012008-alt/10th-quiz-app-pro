name: Build Signed APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && cp index.html www/ && cp questions.json www/
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android

      - name: Prepare Keystore File
        run: |
          # Keystore को सही जगह पर रखना
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.keystore

      - name: Build Signed APK
        run: |
          cd android
          chmod +x gradlew
          # इस कमांड से एंड्रॉइड अपने आप आपकी फाइल इस्तेमाल करेगा
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/*.apk
