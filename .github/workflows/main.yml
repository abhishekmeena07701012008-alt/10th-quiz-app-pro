name: Build Signed Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android Project
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp questions.json www/ || true
          npx cap init "10th Quiz Pro" com.abhishek.quizpro --web-dir www
          npx cap add android
          npx cap copy android

      - name: Generate Keystore Script
        # यहाँ हमने पूरी कमांड को एक सुरक्षित फाइल में डाल दिया है
        run: |
          echo "keytool -genkeypair -v -keystore android/app/release.keystore -alias ${{ secrets.KEY_ALIAS }} -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEY_PASSWORD }} -dname 'CN=Abhishek, O=QuizPro, C=IN' -noprompt" > gen_key.sh
          chmod +x gen_key.sh
          ./gen_key.sh

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/*.apk
