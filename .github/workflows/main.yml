name: Build Android APK (Unsigned)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html www/
          cp questions.json www/ || true
          cp app-ads.txt www/ || true

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "10th Quiz Pro" "com.abhishek.quizpro" --web-dir www
          npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
