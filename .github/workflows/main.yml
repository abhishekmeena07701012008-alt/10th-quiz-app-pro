name: Build Android APK (Unsigned)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob
          mkdir -p www
          touch index.html
          cp index.html www/
          [ -f questions.json ] && cp questions.json www/ || echo "{}" > www/questions.json
          [ -f app-ads.txt ] && cp app-ads.txt www/ || touch www/app-ads.txt

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "10th Quiz Pro" "com.abhishek.quizpro" --web-dir www
          npx cap add android

      - name: Fix SDK 34 Requirement (Final Fix)
        run: |
          # variables.gradle mein SDK change karna
          sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 34/g" android/variables.gradle
          sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 34/g" android/variables.gradle
          # app/build.gradle ke andar bhi force replace karna taaki conflict na ho
          sed -i "s/compileSdkVersion.*/compileSdkVersion 34/g" android/app/build.gradle
          sed -i "s/targetSdkVersion.*/targetSdkVersion 34/g" android/app/build.gradle

      - name: Inject AdMob Meta-data (मीठा)
        run: |
          sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3294666124278706~9263155799"/>' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android Version Code Automatically
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/g" android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 10th-Quiz-Pro-Final
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
