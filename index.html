<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Final</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; padding-bottom: 60px; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
        .hidden { display: none !important; }
        #offline-screen { z-index: 9999; text-align: center; }
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #334155; }
        #timer-bar { height: 100%; background: var(--accent); width: 100%; transition: linear 1s; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; border: 1px solid #334155; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; color: white; text-decoration: none; }
        .btn-lang { background: linear-gradient(135deg, #f97316, #ea580c); }
        .btn-sub { background: #2563eb; text-align: left; padding-left: 15px; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 12px; border-radius: 8px; z-index: 1000; }
        .option-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white; text-align: left; font-size: 1rem; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        .score-val { font-size: 4.5rem; color: var(--accent); font-weight: 800; margin: 5px 0; }
        .report-grid { display: flex; justify-content: space-around; margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid #475569; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; }
        .stat-value { font-size: 1rem; font-weight: bold; }
        #bottom-ad { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    </style>
</head>
<body>

    <div id="offline-screen" class="screen hidden">
        <div class="card"><h1>🚫</h1><h2>इंटरनेट बंद है</h2><button class="btn btn-lang" onclick="checkInternet()">Retry</button></div>
    </div>

    <div id="lang-screen" class="screen">
        <div class="card">
            <h1 style="color:var(--accent);">10th Quiz Pro</h1>
            <button class="btn btn-lang" onclick="initApp('hi')">हिंदी माध्यम</button>
            <button class="btn btn-lang" style="background:#059669" onclick="initApp('en')">English Medium</button>
        </div>
    </div>

    <div id="sub-screen" class="screen hidden">
        <div class="card">
            <h2>विषय चुनें</h2>
            <button class="btn btn-sub" onclick="startQuiz('Science')">🧪 Science / विज्ञान</button>
            <button class="btn btn-sub" onclick="startQuiz('Mathematics')">📐 Maths / गणित</button>
            <button class="btn btn-sub" onclick="startQuiz('Social Science')">🌍 SST / सा. विज्ञान</button>
            <button class="btn btn-sub" onclick="startQuiz('Hindi')">📖 Hindi / हिंदी</button>
            <button class="btn btn-sub" onclick="startQuiz('English')">🔤 English / अंग्रेजी</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen hidden" style="justify-content: flex-start; padding-top: 60px;">
        <button class="back-btn" onclick="goBack()">◀ Back</button>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="card">
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem; color:var(--accent); margin-bottom: 10px;">
                <span id="active-sub"></span><span id="q-count"></span>
            </div>
            <h3 id="q-text" style="text-align: left; font-size: 1.1rem; line-height: 1.4;"></h3>
            <div id="opt-container"></div>
        </div>
    </div>

    <div id="report-screen" class="screen hidden">
        <div class="card">
            <h2 style="color: #94a3b8; font-size: 0.8rem; letter-spacing: 1.5px;">RESULT</h2>
            <div class="score-val" id="final-score">0%</div>
            <div class="report-grid">
                <div class="stat-item"><span class="stat-label">Correct</span><span class="stat-value" id="stat-correct" style="color:#10b981">0</span></div>
                <div class="stat-item"><span class="stat-label">Wrong</span><span class="stat-value" id="stat-wrong" style="color:#ef4444">0</span></div>
                <div class="stat-item"><span class="stat-label">Total</span><span class="stat-value" id="stat-total">20</span></div>
            </div>
            <p id="perf-msg" style="font-weight: bold;"></p>
            <button class="btn btn-lang" onclick="location.reload()">दोबारा खेलें</button>
            <button class="btn btn-sub" style="text-align:center" onclick="goBack()">Main Menu</button>
        </div>
    </div>

    <div id="bottom-ad">AdMob Banner Loading...</div>

<script>
    // --- ADMOB SDK CONFIGURATION ---
    const BANNER_ID = 'ca-app-pub-3294666124278706/6948834455'; 
    const INTERSTITIAL_ID = 'ca-app-pub-3294666124278706/3782176991'; 

    async function initializeAds() {
        if (window.Capacitor && window.AdMob) {
            await AdMob.initialize();
            AdMob.showBanner({ adId: BANNER_ID, position: 'BOTTOM_CENTER', margin: 0 });
        }
    }

    async function showInterstitial() {
        if (window.Capacitor && window.AdMob) {
            await AdMob.prepareInterstitial({ adId: INTERSTITIAL_ID });
            await AdMob.showInterstitial();
        }
    }

    // --- QUIZ LOGIC ---
    let lang = '', subject = '', quizSet = [], currentIndex = 0, score = 0, timer, timeLeft = 10;

    function checkInternet() {
        if (!navigator.onLine) document.getElementById('offline-screen').classList.remove('hidden');
        else document.getElementById('offline-screen').classList.add('hidden');
    }
    setInterval(checkInternet, 4000);

    function initApp(l) { 
        lang = l; 
        document.getElementById('lang-screen').classList.add('hidden'); 
        document.getElementById('sub-screen').classList.remove('hidden'); 
        initializeAds(); // SDK Init & Banner Show
    }

    function goBack() { 
        clearInterval(timer); 
        document.getElementById('quiz-screen').classList.add('hidden'); 
        document.getElementById('report-screen').classList.add('hidden'); 
        document.getElementById('sub-screen').classList.remove('hidden'); 
        currentIndex = 0; score = 0;
    }

    async function startQuiz(sub) { 
        subject = sub; 
        document.getElementById('sub-screen').classList.add('hidden'); 
        document.getElementById('quiz-screen').classList.remove('hidden'); 
        const res = await fetch('questions.json'); 
        const data = await res.json(); 
        quizSet = data.filter(q => q.subject === sub).sort(() => Math.random() - 0.5).slice(0, 20); 
        loadQuestion(); 
    }

    function loadQuestion() { 
        if (currentIndex >= quizSet.length) { showReport(); return; } 
        clearInterval(timer); timeLeft = 10; 
        const bar = document.getElementById('timer-bar'); 
        bar.style.transition = 'none'; bar.style.width = '100%'; 
        setTimeout(() => { bar.style.transition = 'linear 1s'; }, 20); 
        
        const q = quizSet[currentIndex]; 
        document.getElementById('active-sub').innerText = subject.toUpperCase(); 
        document.getElementById('q-count').innerText = `${currentIndex + 1} / ${quizSet.length}`; 
        document.getElementById('q-text').innerText = (lang === 'hi') ? q.question_hi : q.question_en; 
        
        const container = document.getElementById('opt-container'); 
        container.innerHTML = ''; 
        q.options.forEach(opt => { 
            const btn = document.createElement('button'); 
            btn.className = 'option-btn'; btn.innerText = opt; 
            btn.onclick = () => handleAnswer(btn, opt, q.answer); 
            container.appendChild(btn); 
        }); 
        
        timer = setInterval(() => { 
            timeLeft--; bar.style.width = (timeLeft * 10) + "%"; 
            if (timeLeft <= 0) handleAnswer(null, null, q.answer);
        }, 1000); 
    }

    function handleAnswer(btn, selected, correct) { 
        clearInterval(timer); 
        if (selected === correct) { if(btn) btn.classList.add('correct'); score++; } 
        else { if(btn) btn.classList.add('wrong'); } 
        setTimeout(() => { currentIndex++; loadQuestion(); }, 1000); 
    }

    function showReport() { 
        document.getElementById('quiz-screen').classList.add('hidden'); 
        document.getElementById('report-screen').classList.remove('hidden'); 
        let per = Math.round((score / quizSet.length) * 100); 
        document.getElementById('final-score').innerText = per + "%"; 
        document.getElementById('stat-correct').innerText = score;
        document.getElementById('stat-wrong').innerText = quizSet.length - score;
        document.getElementById('perf-msg').innerText = per >= 60 ? "Excellent Job! 🌟" : "Keep Learning! 📚"; 
        showInterstitial(); // Show Interstitial SDK Ad
    }
    checkInternet();
</script>
</body>
</html>
