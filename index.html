<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Smart Learning</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2b2d42;
            --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; justify-content: center; min-height: 100vh; margin: 0; align-items: center; }
        .quiz-card { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        
        /* Progress Bar */
        .progress-container { background: #eee; height: 8px; width: 100%; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.4s; }

        .content { padding: 30px; }
        .header { display: flex; justify-content: space-between; font-weight: 600; color: var(--dark); margin-bottom: 20px; }
        
        .question-box { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        
        .option { 
            display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #edf2f7; 
            border-radius: 12px; cursor: pointer; transition: 0.3s; background: white; font-size: 1rem; 
            text-align: left; color: var(--dark); font-weight: 500;
        }
        .option:hover { border-color: var(--primary); background: #f0f4ff; }
        .option.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        /* Report Card Styling */
        #report-card { text-align: center; display: none; padding: 40px 20px; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 0 auto 20px; color: var(--primary); }
        .feedback-text { font-size: 1.1rem; margin-bottom: 25px; color: #555; font-style: italic; }
        .btn-retry { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-retry:hover { background: #3046bc; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <div id="quiz-screen" class="content">
        <div class="header">
            <span>सवाल: <span id="current-count">1</span>/20</span>
            <span id="score-display">स्कोर: 0</span>
        </div>
        <div class="question-box" id="question">लोड हो रहा है...</div>
        <div id="options"></div>
    </div>

    <div id="report-card" class="content">
        <h2 style="margin-top:0">रिपोर्ट कार्ड</h2>
        <div class="score-circle" id="final-score">0/20</div>
        <div id="status-emoji" style="font-size: 3rem; margin-bottom: 10px;">🎯</div>
        <h3 id="grade-title">शानदार!</h3>
        <p class="feedback-text" id="feedback">आपकी पढ़ाई बहुत अच्छी चल रही है।</p>
        <button class="btn-retry" onclick="location.reload()">दोबारा टेस्ट दें</button>
    </div>
</div>

<script>
    let questionsData = [];
    let quizSet = [];
    let currentIdx = 0;
    let score = 0;

    // JSON लोड करना (1500+ सवालों के लिए ऑप्टिमाइज़्ड)
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            questionsData = await response.json();
            startQuiz();
        } catch (error) {
            document.getElementById('question').innerText = "JSON लोड करने में समस्या आ रही है!";
        }
    }

    function startQuiz() {
        // 1500 में से 20 रैंडम सवाल चुनना
        quizSet = questionsData.sort(() => 0.5 - Math.random()).slice(0, 20);
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= quizSet.length) {
            showReportCard();
            return;
        }

        const q = quizSet[currentIdx];
        document.getElementById('question').innerText = q.question;
        document.getElementById('current-count').innerText = currentIdx + 1;
        document.getElementById('progress-bar').style.width = ((currentIdx + 1) / 20) * 100 + "%";

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        // ऑप्शन्स को शफल करना
        const shuffledOpts = [...q.options].sort(() => 0.5 - Math.random());

        shuffledOpts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.answer);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-display').innerText = `स्कोर: ${score}`;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if (b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            currentIdx++;
            showQuestion();
        }, 1000);
    }

    function showReportCard() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('report-card').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/20`;

        const gradeTitle = document.getElementById('grade-title');
        const feedback = document.getElementById('feedback');
        const emoji = document.getElementById('status-emoji');

        // परफॉरमेंस के आधार पर रिपोर्ट
        if (score >= 18) {
            gradeTitle.innerText = "अति उत्तम (Excellent!)";
            feedback.innerText = "आपकी तैयारी लाजवाब है! बोर्ड एग्जाम में आप टॉप कर सकते हैं।";
            emoji.innerText = "🏆";
        } else if (score >= 12) {
            gradeTitle.innerText = "बहुत अच्छा (Good)";
            feedback.innerText = "आपकी पढ़ाई सही दिशा में है, बस थोड़ी और मेहनत की ज़रूरत है।";
            emoji.innerText = "⭐";
        } else {
            gradeTitle.innerText = "सुधार की ज़रूरत (Need Focus)";
            feedback.innerText = "घबराएं नहीं! टॉपिक्स को दोबारा पढ़ें और फिर से कोशिश करें।";
            emoji.innerText = "📚";
        }
    }

    loadQuestions();
</script>

</body>
</html>
