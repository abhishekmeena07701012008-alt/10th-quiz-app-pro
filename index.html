<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Smart Edition</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
        .hidden { display: none !important; }

        /* Timer Bar */
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #334155; }
        #timer-bar { height: 100%; background: #fbbf24; width: 100%; transition: linear 1s; }

        /* UI Elements */
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 500px; border: 1px solid #334155; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-lang { background: linear-gradient(45deg, #f97316, #ea580c); }
        .btn-sub { background: #2563eb; text-align: left; padding-left: 20px; font-size: 1rem; }
        
        .option-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #334155; border-radius: 12px; background: #1e293b; color: white; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        
        .submit-btn { background: #64748b; margin-top: 20px; font-size: 0.9rem; padding: 10px; }
        .score-val { font-size: 4rem; color: #fbbf24; font-weight: bold; }
        .feedback-text { margin: 15px 0; font-style: italic; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="lang-screen" class="screen">
        <div class="card">
            <h1 style="color:#fbbf24">10th Quiz Pro</h1>
            <p>Select Your Medium / अपनी भाषा चुनें</p>
            <button class="btn btn-lang" onclick="initApp('hi')">Hindi (हिंदी)</button>
            <button class="btn btn-lang" style="background:#16a34a" onclick="initApp('en')">English</button>
        </div>
    </div>

    <div id="sub-screen" class="screen hidden">
        <div class="card">
            <h3 id="sub-title"></h3>
            <div id="sub-list">
                <button class="btn btn-sub" onclick="startQuiz('science')">🧪 Science / विज्ञान</button>
                <button class="btn btn-sub" onclick="startQuiz('maths')">📐 Maths / गणित</button>
                <button class="btn btn-sub" onclick="startQuiz('sst')">🌍 SST / सा. विज्ञान</button>
                <button class="btn btn-sub" onclick="startQuiz('hindi')">📖 Hindi / हिंदी</button>
                <button class="btn btn-sub" onclick="startQuiz('english')">🔤 English / अंग्रेजी</button>
                <button class="btn btn-sub" onclick="startQuiz('sanskrit')">🕉️ Sanskrit / संस्कृत</button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" class="screen hidden" style="justify-content: flex-start; padding-top: 40px;">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="card">
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem; margin-bottom:15px; color:#fbbf24">
                <span id="active-sub"></span>
                <span id="q-count"></span>
            </div>
            <h3 id="q-text" style="min-height: 60px;"></h3>
            <div id="opt-container"></div>
            <button class="btn submit-btn" id="mid-submit" onclick="showReport()"></button>
        </div>
    </div>

    <div id="report-screen" class="screen hidden">
        <div class="card">
            <h2 id="res-title"></h2>
            <div class="score-val" id="final-score">0</div>
            <p id="perf-msg" class="feedback-text"></p>
            <button class="btn btn-lang" onclick="location.reload()" id="retry-btn"></button>
        </div>
    </div>

<script>
    let lang = '', subject = '', allQuestions = [], quizSet = [], currentIndex = 0, score = 0, timer, timeLeft = 10;

    const uiText = {
        hi: { subTitle: "विषय चुनें", submit: "क्विज समाप्त करें", retry: "दोबारा शुरू करें", res: "आपका परिणाम", loading: "लोड हो रहा है...", wait: "कृपया प्रतीक्षा करें" },
        en: { subTitle: "Select Subject", submit: "Submit Quiz", retry: "Try Again", res: "Your Result", loading: "Loading...", wait: "Please wait" }
    };

    function initApp(l) {
        lang = l;
        document.getElementById('lang-screen').classList.add('hidden');
        document.getElementById('sub-screen').classList.remove('hidden');
        document.getElementById('sub-title').innerText = uiText[lang].subTitle;
    }

    async function startQuiz(sub) {
        subject = sub;
        document.getElementById('sub-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('mid-submit').innerText = uiText[lang].submit;
        
        try {
            const res = await fetch('questions.json');
            const data = await res.json();
            // 1. Filter Subject -> 2. Shuffle ALL -> 3. Pick 10
            allQuestions = data.filter(q => q.subject === sub);
            quizSet = allQuestions.sort(() => Math.random() - 0.5).slice(0, 10);
            loadQuestion();
        } catch (e) { alert("Error: questions.json not found!"); }
    }

    function loadQuestion() {
        if (currentIndex >= quizSet.length) { showReport(); return; }
        
        clearInterval(timer);
        timeLeft = 10;
        updateTimerBar();

        const q = quizSet[currentIndex];
        document.getElementById('active-sub').innerText = subject.toUpperCase();
        document.getElementById('q-count').innerText = `${currentIndex + 1}/10`;
        document.getElementById('q-text').innerText = q.q[lang];
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        // Answer Shuffling
        [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt[lang];
            btn.onclick = () => handleAnswer(btn, opt.isCorrect);
            container.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if (timeLeft <= 0) { handleAnswer(null, false); }
        }, 1000);
    }

    function updateTimerBar() {
        document.getElementById('timer-bar').style.width = (timeLeft * 10) + "%";
    }

    function handleAnswer(btn, isCorrect) {
        clearInterval(timer);
        const container = document.getElementById('opt-container');
        
        if (isCorrect) {
            if(btn) btn.classList.add('correct');
            score++;
        } else {
            if(btn) btn.classList.add('wrong');
            // Show correct answer automatically
            Array.from(container.children).forEach(b => {
                // Find correct option in current quizSet
                const correctText = quizSet[currentIndex].options.find(o => o.isCorrect)[lang];
                if(b.innerText === correctText) b.classList.add('correct');
            });
            if (navigator.vibrate) navigator.vibrate(200);
        }

        Array.from(container.children).forEach(b => b.style.pointerEvents = 'none');
        setTimeout(() => { currentIndex++; loadQuestion(); }, 1200);
    }

    function showReport() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        document.getElementById('res-title').innerText = uiText[lang].res;
        document.getElementById('retry-btn').innerText = uiText[lang].retry;
        document.getElementById('final-score').innerText = `${score}/10`;

        let msg = "";
        const p = (score / 10) * 100;
        
        if(lang === 'hi') {
            if(p >= 90) msg = "असाधारण! आप टॉपर बनने के लिए तैयार हैं।";
            else if(p >= 60) msg = "बहुत अच्छा! थोड़ी और मेहनत आपको नंबर 1 बना देगी।";
            else msg = "आपको और अभ्यास की जरूरत है। हार न मानें!";
        } else {
            if(p >= 90) msg = "Outstanding! You are ready to top the exams.";
            else if(p >= 60) msg = "Great job! A bit more effort will make you a topper.";
            else msg = "You need more practice. Keep working hard!";
        }
        document.getElementById('perf-msg').innerText = msg;
    }
</script>
</body>
</html>
<script>
    let questions = [];
    let currentQuestionIndex = 0;

    // JSON फाइल लोड करने का फंक्शन
    async function loadQuizData() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) {
                throw new Error('questions.json not found!');
            }
            questions = await response.json();
            
            // सवालों को मिक्स करना ताकि रिपीट न हों और हर बार नया क्रम मिले
            questions.sort(() => Math.random() - 0.5);
            
            showQuestion();
        } catch (error) {
            console.error('Error loading JSON:', error);
            document.getElementById('question').innerText = "सवाल लोड करने में समस्या आ रही है!";
        }
    }

    // सवाल स्क्रीन पर दिखाने का फंक्शन
    function showQuestion() {
        if (currentQuestionIndex >= questions.length) {
            document.getElementById('question-container').innerHTML = "<h2>क्विज़ पूरी हुई! आपने सभी सवाल देख लिए हैं।</h2>";
            return;
        }

        const q = questions[currentQuestionIndex];
        const qElement = document.getElementById('question');
        const oContainer = document.getElementById('options');

        // हिंदी और इंग्लिश दोनों भाषा में सवाल दिखाना
        qElement.innerHTML = `
            <div style="font-size: 0.8em; color: #ffcc00; margin-bottom: 5px;">Subject: ${q.subject}</div>
            <div style="margin-bottom: 10px;">${q.question_hi}</div>
            <div style="font-size: 0.85em; color: #bbb; font-style: italic;">${q.question_en}</div>
        `;

        oContainer.innerHTML = ''; // पुराने ऑप्शंस हटाना

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'btn'; // आपकी CSS क्लास का नाम यहाँ रखें
            btn.onclick = () => checkAnswer(opt, q.answer);
            oContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        if (selected === correct) {
            alert("सही जवाब! (Correct)");
        } else {
            alert("गलत जवाब! सही उत्तर है: " + correct);
        }
        
        // अगले सवाल पर जाना
        currentQuestionIndex++;
        showQuestion();
    }

    // ऐप शुरू होते ही डेटा लोड करें
    loadQuizData();
</script>
