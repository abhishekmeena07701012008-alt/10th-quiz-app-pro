<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Best Learning App</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 20px; }

        .subject-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover { background: var(--secondary); transform: translateY(-2px); }

        #quiz-section, #result-section { display: none; }

        .question { font-size: 20px; margin-bottom: 20px; text-align: left; }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            background: #334155;
            color: white;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
        }

        .option-btn.correct { background: var(--success); }
        .option-btn.wrong { background: var(--error); }

        .score-text { font-size: 24px; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>10th Quiz Pro 🚀</h1>
        <p>अपना विषय चुनें और अभ्यास शुरू करें:</p>
        <div class="subject-grid">
            <button class="btn" onclick="startQuiz('Hindi')">हिंदी</button>
            <button class="btn" onclick="startQuiz('English')">English</button>
            <button class="btn" onclick="startQuiz('Maths')">गणित</button>
            <button class="btn" onclick="startQuiz('Science')">विज्ञान</button>
            <button class="btn" onclick="startQuiz('SST')">सामाजिक विज्ञान</button>
            <button class="btn" onclick="startQuiz('Sanskrit')">संस्कृत</button>
        </div>
    </div>

    <div id="quiz-section">
        <h2 id="subject-title">Subject</h2>
        <div class="question" id="question-text">Question here?</div>
        <div class="options" id="options-container"></div>
        <p style="margin-top: 20px;">प्रश्न: <span id="q-count">1</span>/20</p>
    </div>

    <div id="result-section">
        <h2>रिजल्ट कार्ड 🏆</h2>
        <div class="score-text" id="final-score">0 / 20</div>
        <button class="btn" onclick="location.reload()">दोबारा प्रयास करें</button>
    </div>
</div>

<script>
    const allQuestions = {
        'Hindi': [
            { q: "सूरदास के गुरु कौन थे?", a: ["वल्लभाचार्य", "विट्ठलनाथ", "नरहरिदास", "रामानंद"], c: 0 },
            { q: "नेताजी का चश्मा पाठ के लेखक कौन हैं?", a: ["स्वयं प्रकाश", "यत्नींद्र मिश्र", "यशपाल", "मनु भंडारी"], c: 0 },
            // यहाँ आप 20 सवाल जोड़ें
        ],
        'English': [
            { q: "Who is the author of 'A Letter to God'?", a: ["G.L. Fuentes", "Nelson Mandela", "Robert Frost", "Leslie Norris"], c: 0 },
            { q: "What did Lencho hope for?", a: ["A good shower of rain", "A new tractor", "A car", "Money"], c: 0 },
        ],
        'Maths': [
            { q: "द्विघात समीकरण का मानक रूप क्या है?", a: ["ax² + bx + c = 0", "ax + b = 0", "ax³ + b = 0", "None"], c: 0 },
            { q: "sin 90° का मान क्या होता है?", a: ["1", "0", "1/2", "√3/2"], c: 0 },
        ],
        'Science': [
            { q: "मानव शरीर की सबसे बड़ी ग्रंथि है?", a: ["यकृत (Liver)", "अग्न्याशय", "थायराइड", "पीयूष"], c: 0 },
            { q: "प्रकाश के परावर्तन के कितने नियम हैं?", a: ["2", "1", "3", "4"], c: 0 },
        ],
        'SST': [
            { q: "जलियांवाला बाग हत्याकांड कब हुआ?", a: ["13 अप्रैल 1919", "15 अगस्त 1947", "26 जनवरी 1950", "10 मई 1857"], c: 0 },
        ],
        'Sanskrit': [
            { q: "गम् धातु का लट् लकार प्रथम पुरुष एकवचन क्या होगा?", a: ["गच्छति", "गच्छसि", "गच्छामि", "गच्छन्ति"], c: 0 },
        ]
    };

    let currentSubject = "";
    let shuffledQuestions = [];
    let currentIndex = 0;
    let score = 0;

    function startQuiz(sub) {
        currentSubject = sub;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('subject-title').innerText = sub;
        
        // शफलिंग - प्रश्नों को मिक्स करना
        shuffledQuestions = [...allQuestions[sub]].sort(() => Math.random() - 0.5).slice(0, 20);
        showQuestion();
    }

    function showQuestion() {
        const qData = shuffledQuestions[currentIndex];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('q-count').innerText = currentIndex + 1;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";

        // आंसर शफलिंग - ऑप्शन्स को मिक्स करना
        let opts = qData.a.map((text, index) => ({ text, isCorrect: index === qData.c }));
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => checkAnswer(btn, opt.isCorrect);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect) {
        if (isCorrect) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
        }

        // बटन डिसेबल करना ताकि दोबारा क्लिक न हो
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        setTimeout(() => {
            currentIndex++;
            if (currentIndex < shuffledQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${shuffledQuestions.length}`;
    }
</script>

</body>
</html>
