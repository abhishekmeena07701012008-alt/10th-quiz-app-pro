<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - JSON Data</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        .header {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-tag {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .question {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #ddd;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        .next-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div id="quiz-content">
        <div class="header">
            <span class="subject-tag" id="subject">विषय</span>
            <span id="score-display">Question: 1/--</span>
        </div>
        <div class="question" id="question-text">प्रश्न यहाँ दिखाई देगा...</div>
        <div class="options" id="options-container">
            </div>
        <div class="controls">
            <button class="next-btn" id="next-button" onclick="loadNextQuestion()">अगला प्रश्न</button>
        </div>
    </div>
</div>

<script>
    // आपके JSON वीडियो से लिया गया डेटा (सैंपल)
    const quizData = [
        {
            "subject": "Science",
            "question": "श्वसन किस प्रकार की अभिक्रिया है?",
            "options": ["ऊष्माक्षेपी", "संयोजन", "अपचयन", "ऊष्माशोषी"],
            "answer": "ऊष्माक्षेपी"
        },
        {
            "subject": "Maths",
            "question": "वृत्त की सबसे बड़ी जीवा क्या होती है?",
            "options": ["चाप", "चापकर्ण", "व्यास", "त्रिज्या"],
            "answer": "व्यास"
        },
        {
            "subject": "Hindi",
            "question": "कामयानी के रचयिता कौन हैं?",
            "options": ["तुलसीदास", "जयशंकर प्रसाद", "निराला", "पंत"],
            "answer": "जयशंकर प्रसाद"
        }
        // आप यहाँ अपनी .json फ़ाइल के अन्य प्रश्न भी पेस्ट कर सकते हैं
    ];

    let currentQuestionIndex = 0;
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const subjectTag = document.getElementById('subject');
    const nextButton = document.getElementById('next-button');
    const scoreDisplay = document.getElementById('score-display');

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        
        // Reset UI
        nextButton.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        // Set content
        subjectTag.innerText = currentData.subject;
        questionText.innerText = currentData.question;
        scoreDisplay.innerText = `Question: ${currentQuestionIndex + 1}/${quizData.length}`;

        // Create option buttons
        currentData.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.onclick = () => selectOption(button, option, currentData.answer);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(button, selected, correct) {
        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (selected === correct) {
            button.classList.add('correct');
        } else {
            button.classList.add('wrong');
            // सही उत्तर को हाईलाइट करें
            allButtons.forEach(btn => {
                if(btn.innerText === correct) btn.classList.add('correct');
            });
        }
        nextButton.style.display = 'block';
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-content').innerHTML = `
                <div style="text-align:center">
                    <h2>क्विज़ समाप्त!</h2>
                    <p>आपने सभी प्रश्नों के उत्तर दे दिए हैं।</p>
                    <button class="next-btn" style="display:inline-block" onclick="location.reload()">फिर से शुरू करें</button>
                </div>
            `;
        }
    }

    // Initial load
    loadQuestion();
</script>

</body>
</html>
