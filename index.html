<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Subject Wise</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--white); z-index: 10; transition: 0.5s; }
        .hidden { display: none !important; }

        /* Buttons & Cards */
        .card { background: #f1f5f9; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-hi { background: #ff9933; color: white; }
        .btn-en { background: #128807; color: white; }
        .btn-sub { background: var(--primary); color: white; text-transform: capitalize; }
        
        /* Quiz Layout */
        #quiz-app { padding: 20px; display: block; background: var(--bg); position: relative; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .option-btn { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 1rem; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        
        /* Report Card */
        .report-card { text-align: center; }
        .score-big { font-size: 3rem; color: var(--primary); font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="language-screen" class="screen">
        <div class="card">
            <h2>10th Quiz Pro</h2>
            <p>Select Language / भाषा चुनें</p>
            <button class="btn btn-hi" onclick="setLang('hi')">Hindi (हिंदी)</button>
            <button class="btn btn-en" onclick="setLang('en')">English</button>
        </div>
    </div>

    <div id="subject-screen" class="screen hidden">
        <div class="card">
            <h3>Choose Subject / विषय चुनें</h3>
            <div id="subject-list"></div>
        </div>
    </div>

    <div id="quiz-app" class="hidden">
        <div class="quiz-container">
            <div class="header">
                <span id="display-subject" style="font-weight:bold"></span>
                <span id="progress">0/0</span>
            </div>
            <div id="question-box">
                <h3 id="question-text"></h3>
                <div id="options-container"></div>
            </div>
        </div>
    </div>

    <div id="report-screen" class="screen hidden">
        <div class="card report-card">
            <h2>Result / परिणाम</h2>
            <div class="score-big" id="final-score">0/0</div>
            <p id="feedback"></p>
            <button class="btn btn-sub" onclick="location.reload()">Restart Quiz</button>
        </div>
    </div>

<script>
    let selectedLang = '';
    let currentSubject = '';
    let questions = [];
    let currentIndex = 0;
    let score = 0;

    // सब्जेक्ट्स की लिस्ट (आपकी JSON में ये सब्जेक्ट होने चाहिए)
    const subjects = ["science", "maths", "sst", "hindi", "english", "sanskrit"];

    function setLang(lang) {
        selectedLang = lang;
        document.getElementById('language-screen').classList.add('hidden');
        showSubjectScreen();
    }

    function showSubjectScreen() {
        const list = document.getElementById('subject-list');
        list.innerHTML = '';
        document.getElementById('subject-screen').classList.remove('hidden');
        
        subjects.forEach(sub => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-sub';
            btn.innerText = sub.toUpperCase();
            btn.onclick = () => startQuiz(sub);
            list.appendChild(btn);
        });
    }

    async function startQuiz(sub) {
        currentSubject = sub;
        document.getElementById('subject-screen').classList.add('hidden');
        document.getElementById('quiz-app').classList.remove('hidden');
        
        try {
            const response = await fetch('questions.json');
            const data = await response.json();
            // सिर्फ चुने हुए सब्जेक्ट के सवाल फ़िल्टर करना
            questions = data.filter(q => q.subject.toLowerCase() === sub.toLowerCase());
            
            // 1. Questions Shuffle (सवालों को मिलाना)
            questions.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            score = 0;
            loadQuestion();
        } catch (e) { alert("Error loading questions.json"); }
    }

    function loadQuestion() {
        if (currentIndex >= questions.length) {
            showReport();
            return;
        }

        const qData = questions[currentIndex];
        document.getElementById('display-subject').innerText = currentSubject.toUpperCase();
        document.getElementById('progress').innerText = `${currentIndex + 1}/${questions.length}`;
        document.getElementById('question-text').innerText = qData.q[selectedLang];
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // 2. Answer Shuffle (ऑप्शंस को मिलाना)
        let shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt[selectedLang];
            btn.onclick = () => handleAnswer(btn, opt.isCorrect);
            container.appendChild(btn);
        });
    }

    function handleAnswer(btn, isCorrect) {
        if (isCorrect) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
        }

        // सभी बटन लॉक करें
        document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');

        // 3. Auto-Next (1.5 सेकंड बाद अगला सवाल)
        setTimeout(() => {
            currentIndex++;
            loadQuestion();
        }, 1500);
    }

    function showReport() {
        document.getElementById('quiz-app').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        
        let per = (score / questions.length) * 100;
        document.getElementById('feedback').innerText = per >= 33 ? "Congratulations! Pass" : "Keep practicing! Try again";
    }
</script>
</body>
</html>
