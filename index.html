<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Subject Wise</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --error: #c0392b; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Subject Selection Styling */
        .subject-grid { display: grid; grid-template-columns: 1 row; gap: 15px; margin-top: 20px; }
        .subject-btn { padding: 20px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; background: var(--accent); color: white; transition: 0.2s; }
        .subject-btn:hover { transform: translateY(-3px); background: #2980b9; }

        /* Quiz Styling */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .question-box { font-size: 1.3em; font-weight: 600; margin-bottom: 20px; min-height: 80px; color: #333; }
        .option { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; text-align: left; font-size: 1em; background: white; transition: 0.2s; }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        .hidden { display: none; }
        .score-card { text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div id="subject-screen">
        <h2 style="text-align: center; color: var(--primary);">अपना विषय चुनें</h2>
        <div class="subject-grid">
            <button class="subject-btn" onclick="startQuiz('Science')">Science</button>
            <button class="subject-btn" onclick="startQuiz('Maths')">Maths</button>
            <button class="subject-btn" onclick="startQuiz('Social Science')">Social Science</button>
            <button class="subject-btn" onclick="startQuiz('Hindi')">Hindi</button>
            <button class="subject-btn" onclick="startQuiz('English')">English</button>
            <button class="subject-btn" onclick="startQuiz('Sanskrit/IT')">Sanskrit / IT</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="display-subject" style="font-weight: bold; color: var(--accent);"></span>
            <span id="q-count">1/20</span>
        </div>
        <div id="question-text" class="question-box">Loading...</div>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="score-card">
            <h1>📊 रिजल्ट कार्ड</h1>
            <p style="font-size: 1.2em;">विषय: <span id="res-subject"></span></p>
            <p id="final-score" style="font-size: 3em; font-weight: bold; color: var(--primary);"></p>
            <p id="remarks" style="margin-bottom: 25px;"></p>
            <button onclick="location.reload()" style="padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer;">मुख्य मेनू पर जाएं</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let selectedQuestions = [];
    let currentIndex = 0;
    let score = 0;

    // JSON लोड करना
    async function loadData() {
        try {
            const response = await fetch('questions.json');
            allData = await response.json();
        } catch (e) {
            alert("Error: questions.json लोड नहीं हो पाई!");
        }
    }

    // क्विज़ शुरू करना (फिल्टरिंग के साथ)
    function startQuiz(subject) {
        // उस सब्जेक्ट के सवाल अलग करना
        const filtered = allData.filter(q => q.subject === subject);
        
        if(filtered.length === 0) {
            alert("इस सब्जेक्ट के सवाल अभी उपलब्ध नहीं हैं!");
            return;
        }

        // रैंडम 20 सवाल चुनना (या जितने उपलब्ध हों)
        selectedQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, 20);
        
        document.getElementById('display-subject').innerText = subject;
        document.getElementById('subject-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= selectedQuestions.length) return showResult();

        const q = selectedQuestions[currentIndex];
        document.getElementById('q-count').innerText = `${currentIndex + 1}/${selectedQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        // ऑप्शन शफल करना
        const shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.answer);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        // 1 सेकंड का इंतज़ार फिर अगला सवाल
        setTimeout(() => {
            currentIndex++;
            showQuestion();
        }, 1000);
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        document.getElementById('res-subject').innerText = document.getElementById('display-subject').innerText;
        document.getElementById('final-score').innerText = `${score} / ${selectedQuestions.length}`;
        
        let msg = score > 15 ? "शानदार प्रदर्शन! 🔥" : "अच्छी कोशिश! और अभ्यास करें। 👍";
        document.getElementById('remarks').innerText = msg;
    }

    loadData();
</script>

</body>
</html>
