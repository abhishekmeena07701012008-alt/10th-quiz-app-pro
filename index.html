<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4361ee; 
            --success: #2ecc71; 
            --error: #e74c3c; 
            --bg: #f0f2f5;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: 20px; }
        
        /* Subject Grid */
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .sub-btn { padding: 20px 10px; border: 2px solid #eee; border-radius: 15px; background: white; cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--primary); }
        .sub-btn:hover { border-color: var(--primary); background: #f0f3ff; transform: translateY(-3px); }

        .subject-tag { display: inline-block; background: #e8f0fe; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .question-box { font-size: 1.2em; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: #333; }
        
        .option { width: 100%; padding: 15px; border: 2px solid #edf2f4; border-radius: 12px; cursor: pointer; transition: 0.2s; background: white; text-align: left; font-size: 1em; margin-bottom: 10px; }
        .correct { background-color: #d4f8e6 !important; border-color: var(--success) !important; color: #1b5e20; }
        .wrong { background-color: #fdeaea !important; border-color: var(--error) !important; color: #b71c1c; }
        
        .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: linear-gradient(90deg, var(--primary), #4cc9f0); width: 0%; transition: 0.4s; }
        
        .hidden { display: none; }
        .loader { text-align: center; padding: 40px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" class="loader">
        <div class="spinner"></div>
        <p>प्रश्नों को तैयार किया जा रहा है...</p>
    </div>

    <div id="home-screen" class="hidden">
        <h2 style="text-align: center; color: var(--primary); margin: 0;">10th Quiz Pro 🚀</h2>
        <p style="text-align: center; color: #666; font-size: 0.9em;">अपना विषय चुनें और टेस्ट शुरू करें</p>
        <div class="subject-grid">
            <button class="sub-btn" onclick="startQuiz('Science')">🧪 Science</button>
            <button class="sub-btn" onclick="startQuiz('Maths')">📐 Maths</button>
            <button class="sub-btn" onclick="startQuiz('Social Science')">🌍 S. Science</button>
            <button class="sub-btn" onclick="startQuiz('Hindi')">✍️ Hindi</button>
            <button class="sub-btn" onclick="startQuiz('English')">🔤 English</button>
            <button class="sub-btn" onclick="startQuiz('Sanskrit/IT')">💻 SKT / IT</button>
        </div>
    </div>

    <div id="quiz-area" class="hidden">
        <div class="progress-bar"><div id="progress"></div></div>
        <div id="subject-name" class="subject-tag">Subject</div>
        <div id="question-text" class="question-box">सवाल लोड हो रहा है...</div>
        <div id="options-container"></div>
        <p style="text-align: right; color: #999; font-size: 0.85em;">सवाल: <span id="q-count">1</span>/20</p>
    </div>

    <div id="result-area" class="hidden" style="text-align: center;">
        <h1>📊 रिजल्ट कार्ड</h1>
        <div id="final-score" style="font-size: 3em; color: var(--primary); font-weight: bold; margin: 20px 0;"></div>
        <p id="remarks" style="font-weight: 600; margin-bottom: 30px;"></p>
        <button onclick="location.reload()" style="width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">मुख्य मेनू पर जाएं</button>
    </div>
</div>

<script>
    let allData = [];
    let selectedSet = [];
    let index = 0;
    let score = 0;

    async function loadQuestions() {
        try {
            const res = await fetch('questions.json');
            allData = await res.json();
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        } catch (e) {
            document.getElementById('loading-screen').innerHTML = "❌ डेटा लोड करने में त्रुटि! कृपया JSON फाइल चेक करें।";
        }
    }

    function startQuiz(subject) {
        const filtered = allData.filter(q => q.subject === subject);
        if(filtered.length === 0) return alert("इस विषय के सवाल अभी उपलब्ध नहीं हैं!");

        // रैंडम 20 सवाल चुनना
        selectedSet = filtered.sort(() => 0.5 - Math.random()).slice(0, 20);
        
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        showStep();
    }

    function showStep() {
        if (index >= selectedSet.length) return showFinal();

        const q = selectedSet[index];
        document.getElementById('subject-name').innerText = q.subject;
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('q-count').innerText = index + 1;
        document.getElementById('progress').style.width = ((index + 1) / selectedSet.length * 100) + "%";

        const box = document.getElementById('options-container');
        box.innerHTML = "";

        [...q.options].sort(() => 0.5 - Math.random()).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => verify(btn, opt, q.answer);
            box.appendChild(btn);
        });
    }

    function verify(btn, choice, correct) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if (choice === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if (b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => { index++; showStep(); }, 1200);
    }

    function showFinal() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${selectedSet.length}`;
        
        let msg = score >= 18 ? "अद्भुत! आप टॉपर बनेंगे। 🌟" : 
                  score >= 12 ? "बहुत अच्छा! थोड़ी और मेहनत की जरूरत है। 👍" : "कोशिश करते रहें! 💪";
        document.getElementById('remarks').innerText = msg;
    }

    loadQuestions();
</script>

</body>
</html>
<div id="google_translate_element" style="text-align: right; padding: 10px;"></div>

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'hi', 
            includedLanguages: 'hi,en', 
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
    }
</script>
