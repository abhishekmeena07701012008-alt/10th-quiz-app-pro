<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Intelligent Edition</title>
    <style>
        :root { --primary: #4A90E2; --correct: #2ecc71; --wrong: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .sub-btn { background: var(--primary); color: white; font-size: 14px; }
        .option-btn { width: 100%; margin: 8px 0; background: white; border: 2px solid #eee; text-align: left; font-size: 15px; }
        .option-btn.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-btn.wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        #quiz-box { display: none; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="home">
        <h1 style="color: var(--primary); margin:0;">10th Quiz Pro 🚀</h1>
        <p style="color: #666;">हर बार 20 नए सवाल (Shuffled)</p>
        <div class="subject-grid">
            <button class="btn sub-btn" onclick="startQuiz('science')">Science</button>
            <button class="btn sub-btn" onclick="startQuiz('maths')">Maths</button>
            <button class="btn sub-btn" onclick="startQuiz('social_science')">Social Science</button>
            <button class="btn sub-btn" onclick="startQuiz('hindi')">Hindi</button>
            <button class="btn sub-btn" onclick="startQuiz('english')">English</button>
            <button class="btn sub-btn" onclick="startQuiz('sanskrit')">Sanskrit</button>
        </div>
    </div>

    <div id="quiz-box">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <h3 id="question-text" style="min-height: 60px;"></h3>
        <div id="options-container"></div>
        <p style="margin-top:15px; font-size:14px; color:#888;">Question <span id="q-count">1</span>/20</p>
    </div>
</div>

<script>
    let allData = {};
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    async function loadData() {
        try {
            const response = await fetch('questions.json');
            allData = await response.json();
        } catch (e) { alert("questions.json लोड नहीं हो पाई!"); }
    }

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function startQuiz(subject) {
        if(!allData[subject]) return alert("इस विषय के सवाल अभी उपलब्ध नहीं हैं!");
        
        // 1. सवाल शफल करें और केवल 20 चुनें
        currentQuestions = shuffle([...allData[subject]]).slice(0, 20);
        currentIndex = 0;
        score = 0;
        
        document.getElementById('home').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('q-count').innerText = currentIndex + 1;
        document.getElementById('progress').style.width = ((currentIndex + 1) / 20 * 100) + "%";

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // 2. ऑप्शंस शफल करें
        const shuffledOptions = shuffle([...q.options]);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerText = opt;
            btn.onclick = (e) => checkAnswer(e.target, opt, q.answer);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none'); // दोबारा क्लिक रोकना

        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // सही उत्तर को भी हाईलाइट करें
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        // 3. 1 सेकंड बाद अगला सवाल
        setTimeout(() => {
            currentIndex++;
            if(currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                alert(`क्विज़ पूरा हुआ! आपका स्कोर: ${score}/20`);
                location.reload();
            }
        }, 1000);
    }

    window.onload = loadData;
</script>
</body>
</html>
