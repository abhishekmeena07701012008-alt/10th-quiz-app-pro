<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - 2026</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        h1 { color: #333; margin-bottom: 1.5rem; }

        .subject-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .subject-btn:hover { transform: scale(1.02); }

        .option-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .correct { background-color: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background-color: var(--error-color) !important; color: white; border-color: var(--error-color); }

        #question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #444; }
        #progress { margin-bottom: 10px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="quiz-container" id="setup-screen">
        <h1>10th Quiz Pro</h1>
        <p>अपना विषय चुनें (20 प्रश्न)</p>
        <div id="subject-list">
            </div>
    </div>

    <div class="quiz-container hidden" id="quiz-screen">
        <div id="progress">प्रश्न 1 / 20</div>
        <div id="question-text">प्रश्न यहाँ लोड होगा...</div>
        <div id="options-container"></div>
    </div>

    <div class="quiz-container hidden" id="result-screen">
        <h1>परिणाम</h1>
        <p id="score-text"></p>
        <button class="subject-btn" onclick="location.reload()">फिर से खेलें</button>
    </div>

    <script>
        let allQuestions = [];
        let filteredQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        const totalQuizQuestions = 20;

        // JSON फ़ाइल लोड करना
        fetch('questions.json')
            .then(res => res.json())
            .then(data => {
                allQuestions = data;
                populateSubjects();
            });

        function populateSubjects() {
            const subjects = [...new Set(allQuestions.map(q => q.subject))];
            const container = document.getElementById('subject-list');
            subjects.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.innerText = sub;
                btn.onclick = () => startQuiz(sub);
                container.appendChild(btn);
            });
        }

        function startQuiz(subject) {
            // विषय के हिसाब से फ़िल्टर करें और शफ़ल करें
            filteredQuestions = allQuestions
                .filter(q => q.subject === subject)
                .sort(() => Math.random() - 0.5)
                .slice(0, totalQuizQuestions);

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = filteredQuestions[currentQuestionIndex];
            document.getElementById('progress').innerText = `प्रश्न ${currentQuestionIndex + 1} / ${filteredQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // ऑप्शंस को शफ़ल करना (Option Shuffling)
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, q.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => b.disabled = true); // एक बार क्लिक के बाद सब लॉक

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                // सही उत्तर भी दिखाएँ
                allButtons.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
            }

            // 1 सेकंड बाद अगला सवाल
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < filteredQuestions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `आपका स्कोर: ${score} / ${filteredQuestions.length}`;
        }
    </script>
</body>
</html>
