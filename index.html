<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Quiz Pro - Premium</title>
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f0f2f5;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 450px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Loader */
        #loader { padding: 50px; text-align: center; font-weight: bold; }
        
        .quiz-header { padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; }
        .progress-bar { height: 6px; background: #e0e0e0; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        
        .quiz-body { padding: 25px; }
        .question { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; color: #1a1a1a; line-height: 1.5; }
        
        .option { 
            display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #f0f0f0; 
            border-radius: 12px; cursor: pointer; background: white; font-size: 1rem; text-align: left; 
            font-weight: 500; transition: 0.2s;
        }
        .option:hover { border-color: var(--primary); background: #f8faff; }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }

        /* Report Card */
        #report { display: none; padding: 40px 20px; text-align: center; }
        .grade-box { font-size: 3rem; margin: 20px 0; font-weight: 900; color: var(--primary); }
        .comment { font-style: italic; color: #666; margin-bottom: 30px; font-size: 1.1rem; }
        .retry-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">📝 सवाल तैयार हो रहे हैं...</div>

    <div id="quiz-ui" class="hidden">
        <div class="progress-bar"><div id="progress"></div></div>
        <div class="quiz-header">
            <span>प्रश्न: <span id="q-num">1</span>/20</span>
            <span id="score-text">स्कोर: 0</span>
        </div>
        <div class="quiz-body">
            <div class="question" id="ques-text"></div>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="report">
        <h2 style="margin:0">आपका रिपोर्ट कार्ड</h2>
        <div class="grade-box" id="final-score">0/20</div>
        <p id="grade-label" style="font-weight: bold; font-size: 1.3rem;"></p>
        <p class="comment" id="feedback"></p>
        <button class="retry-btn" onclick="location.reload()">दोबारा कोशिश करें</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let currentSet = [];
    let qIdx = 0;
    let score = 0;

    async function fetchData() {
        try {
            // फ़ाइल का नाम और पाथ पक्का कर लें (questions.json)
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('File not found');
            allQuestions = await response.json();
            
            // 1500 में से 20 रैंडम सवाल चुनना
            currentSet = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 20);
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            renderQuestion();
        } catch (err) {
            document.getElementById('loader').innerHTML = "❌ Error: 'questions.json' फ़ाइल नहीं मिली!<br><small>पक्का करें कि फ़ाइल इसी फोल्डर में है।</small>";
        }
    }

    function renderQuestion() {
        if (qIdx >= currentSet.length) {
            showReport();
            return;
        }

        const q = currentSet[qIdx];
        document.getElementById('ques-text').innerText = q.question;
        document.getElementById('q-num').innerText = qIdx + 1;
        document.getElementById('progress').style.width = ((qIdx + 1) / 20) * 100 + "%";

        const box = document.getElementById('options-box');
        box.innerHTML = '';

        // विकल्पों को भी मिक्स करना
        const shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => check(btn, opt, q.answer);
            box.appendChild(btn);
        });
    }

    function check(btn, selected, correct) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-text').innerText = `स्कोर: ${score}`;
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => { if (b.innerText === correct) b.classList.add('correct'); });
        }

        // 1 सेकंड बाद अगला सवाल
        setTimeout(() => {
            qIdx++;
            renderQuestion();
        }, 1000);
    }

    function showReport() {
        document.getElementById('quiz-ui').classList.add('hidden');
        const report = document.getElementById('report');
        report.style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/20`;

        const label = document.getElementById('grade-label');
        const feedback = document.getElementById('feedback');

        if (score >= 18) {
            label.innerText = "⭐ एक्सीलेंट! (Top Choice)";
            label.style.color = "#2ecc71";
            feedback.innerText = "आपकी तैयारी जबरदस्त है! आप बोर्ड परीक्षा के लिए पूरी तरह तैयार हैं।";
        } else if (score >= 12) {
            label.innerText = "👍 बहुत अच्छा! (Keep It Up)";
            label.style.color = "#4361ee";
            feedback.innerText = "आप अच्छा कर रहे हैं, बस थोड़ी और प्रैक्टिस की ज़रूरत है।";
        } else {
            label.innerText = "📚 मेहनत करें! (Needs Work)";
            label.style.color = "#e74c3c";
            feedback.innerText = "घबराएं नहीं, अपनी किताबों को फिर से पढ़ें और दोबारा टेस्ट दें।";
        }
    }

    fetchData();
</script>

</body>
</html>
